function renderQuiz(){
  if(state.quizCat === undefined) state.quizCat = 'all';
  const filtered = state.quizCat === 'all' ? QUIZ : QUIZ.filter(q=>q.cat === state.quizCat);
  if(!filtered.length){ state.quizCat = 'all'; renderQuiz(); return; }
  const idx = state.quizIdx % filtered.length;
  const q = filtered[idx];
  document.getElementById('main').innerHTML = `
<div class="page">
  <div class="eyebrow">Test your instinct</div>
  <h1 class="disp" style="margin-bottom:18px">${QUIZ.length}+ questions<br/>to <em>train the eye.</em></h1>
  <p class="lede" style="margin-bottom:24px">Mix of theory, formulas, real-world scenarios, diagrams and cause-effect chains. Pick a category or stay on all.</p>

  <div class="quiz-cats" data-testid="quiz-cats">
    <button class="qc-btn ${state.quizCat==='all'?'on':''}" onclick="setQuizCat('all')" data-testid="qc-all">All <span class="qc-n">${QUIZ.length}</span></button>
    ${Object.entries(QCATS).map(([k,lbl])=>{
      const n = QUIZ.filter(q=>q.cat===k).length;
      return `<button class="qc-btn ${state.quizCat===k?'on':''}" onclick="setQuizCat('${k}')" data-testid="qc-${k}">${lbl} <span class="qc-n">${n}</span></button>`;
    }).join('')}
  </div>

  <div class="quiz-meta">
    <div class="qm-prog">Question <strong>${idx+1}</strong> / ${filtered.length}</div>
    <div class="qm-bar"><div class="qm-fill" style="width:${((idx+1)/filtered.length)*100}%"></div></div>
    <div class="qm-score">Score <strong>${state.quizScore}</strong></div>
  </div>

  <div class="quiz-card" data-testid="quiz-card">
    <div class="q-tag">${QCATS[q.cat]||'Theory'}</div>
    ${q.svg ? `<div class="q-diagram">${q.svg}</div>` : ''}
    <div class="q-question">${q.q}</div>
    <div class="q-options" data-testid="quiz-options">
      ${q.opts.map((o,i)=>`<button class="q-opt ${state.quizAns!=null?(i===q.a?'correct':(i===state.quizAns?'wrong':'')):''}" onclick="answerQuiz(${i})" data-testid="quiz-opt-${i}" ${state.quizAns!=null?'disabled':''}>${String.fromCharCode(65+i)}.  ${o}</button>`).join('')}
    </div>
    ${state.quizAns!=null?`<div class="q-explain"><strong>${state.quizAns===q.a?'Right.':'Not quite.'}</strong> ${q.ex}</div>
    <div style="margin-top:18px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-primary" onclick="nextQuiz()" data-testid="quiz-next-btn">Next →</button><button class="btn btn-secondary" onclick="resetQuiz()" data-testid="quiz-reset-btn">Reset score</button></div>`:''}
  </div>
</div>`;
}
function setQuizCat(c){ state.quizCat = c; state.quizIdx = 0; state.quizAns = null; renderQuiz(); }
function answerQuiz(i){
  const filtered = state.quizCat === 'all' ? QUIZ : QUIZ.filter(q=>q.cat === state.quizCat);
  const q = filtered[state.quizIdx % filtered.length];
  state.quizAns = i;
  if(i === q.a) state.quizScore++;
  renderQuiz();
}
function nextQuiz(){ state.quizAns = null; state.quizIdx++; renderQuiz(); }
function resetQuiz(){ state.quizScore = 0; state.quizIdx = 0; state.quizAns = null; renderQuiz(); }

// ─── AI PROMPT HELPERS ───────────────────────────
window.getAIPrompt = ()=> {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth(); // 0-indexed
  const monthName = now.toLocaleString('en-IN',{month:'long'});
  const calQ = month < 3 ? 'Q1 (Jan–Mar)' : month < 6 ? 'Q2 (Apr–Jun)' : month < 9 ? 'Q3 (Jul–Sep)' : 'Q4 (Oct–Dec)';
  // India fiscal year: Apr–Mar
  const fyStart = month >= 3 ? year : year - 1;
  const fyLabel = `FY${String(fyStart).slice(-2)}-${String(fyStart+1).slice(-2)}`;
  const fyQ = month < 3 ? 'Q4' : month < 6 ? 'Q1' : month < 9 ? 'Q2' : 'Q3';
  const dateStr = now.toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'});
  return `STEP 1 — Establish today's date before doing anything else.
Today's date is: ${dateStr}
Current calendar year: ${year}
Current calendar quarter: ${calQ} of ${year}
Current month: ${monthName} ${year}
Current Indian fiscal year: ${fyLabel}
Current fiscal quarter: ${fyQ} of ${fyLabel}

Use this date context to determine what "latest", "current", and "most recent" means for every indicator below. Data freshness priority order: current month (${monthName} ${year}) > current fiscal quarter (${fyQ} ${fyLabel}) > current fiscal year (${fyLabel}) > previous fiscal year. Never use data older than necessary — always search for the most recent release first.

STEP 2 — Collect indicator data.
Collect the latest available data for India from official government, central bank, regulator, or other primary sources wherever possible. If an official source does not publish the indicator, use a widely recognized and trusted secondary source (e.g., S&P Global, CMIE, Trading Economics, World Bank, IMF, OECD).
Return the results as a markdown table with exactly these 4 columns:
| Name of Indicator | Value | Date Updated | Source |
Requirements:
* Use the most recent value available for each indicator as of ${dateStr}.
* Keep the unit, scale, and format exactly as reported by the source.
* Do not normalize, convert, or recalculate values unless specifically instructed below.
* Preserve all decimal places shown by the source.
* Use the latest publication/update date associated with the reported value.
* Include the source name (and source organization where applicable).
* Do not add any commentary, notes, explanations, or text outside the table.
Special instructions:
1. Gross Fixed Capital Formation → Report as % of GDP.
2. Money Supply (M3) → Report YoY growth rate (%).
3. Exports Growth → Report YoY growth rate (%).
4. Foreign Direct Investment → Report current financial year inflows only.
5. Fiscal Deficit → Report as % of GDP.
6. Government Capital Expenditure → Report as % of GDP (or latest officially reported equivalent if % of GDP is unavailable).
7. Electricity Production → Report YoY growth rate (%).
8. Consumer Spending Growth → Report growth rate (%).
9. Forex Reserves → Report in USD Billions.
10. Foreign Direct Investment → Report in USD Billions (not millions).
Use the following indicator order exactly:
1. Quarterly GDP Growth Rate
2. Annual GDP Growth Rate
3. Gross Fixed Capital Formation
4. CPI Inflation
5. Food Inflation
6. WPI Manufacturing
7. RBI Repo Rate
8. Money Supply M3
9. Credit / Loan Growth
10. Forex Reserves
11. Unemployment Rate
12. Trade Balance
13. Exports Growth
14. Foreign Direct Investment
15. Fiscal Deficit
16. Government Capital Expenditure
17. Manufacturing PMI
18. Services PMI
19. Industrial Production (IIP)
20. Electricity Production
21. Business Confidence
22. Consumer Confidence
23. Consumer Spending Growth
Source Priority (highest to lowest):
1. Government of India ministries and agencies (MOSPI, DPIIT, Ministry of Finance, Ministry of Commerce & Industry, Labour Bureau, etc.)
2. Reserve Bank of India (RBI)
3. Official regulator or statutory authority publications
4. S&P Global PMI
5. CMIE
6. IMF, World Bank, OECD
7. Other reputable financial data providers
If multiple sources publish the same indicator, prefer the highest-priority source above. Use only one source per indicator.`;
};
window.copyAIPrompt = async ()=>{
  const text = window.getAIPrompt();
  // Try modern clipboard API first
  if(navigator.clipboard && navigator.clipboard.writeText){
    try{
      await navigator.clipboard.writeText(text);
      flashLive('Prompt copied to clipboard');
      return;
    }catch(e){ /* fall through to legacy method */ }
  }
  // Legacy fallback: create a temporary textarea
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, ta.value.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if(ok){ flashLive('Prompt copied to clipboard'); }
    else{ throw new Error('execCommand failed'); }
  }catch(e){
    // Last resort: show the prompt in a modal so user can manually copy
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(28,28,26,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';
    overlay.innerHTML = `<div style="background:var(--bg-surface);border:1px solid var(--line);padding:28px;max-width:700px;width:100%;max-height:80vh;display:flex;flex-direction:column;gap:14px;">
      <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.16em;color:var(--tx-3);">Copy the prompt below</div>
      <textarea readonly style="width:100%;flex:1;min-height:300px;padding:12px;font-family:var(--mono);font-size:11px;background:var(--bg-page);border:1px solid var(--line);color:var(--tx-1);resize:none;line-height:1.5;" onclick="this.select()">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="this.closest('div[style*=fixed]').remove()" style="font-family:var(--mono);font-size:10px;padding:8px 18px;background:var(--bg-ink);color:var(--bg-page);border:none;cursor:pointer;text-transform:uppercase;letter-spacing:0.14em;">Close</button>
      </div>
    </div>`;
    // Fix textarea value (innerHTML escaped, use textContent approach)
    const ta2 = overlay.querySelector('textarea');
    ta2.value = text;
    document.body.appendChild(overlay);
    ta2.focus();
    ta2.select();
  }
};
