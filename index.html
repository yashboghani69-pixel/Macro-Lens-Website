<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Macro Lens — Read the Economy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg-page:#F7F5F0; --bg-surface:#FFFFFF; --bg-elev:#FBF9F4; --bg-hover:#EAE7DE; --bg-ink:#1C1C1A;
  --tx-1:#1C1C1A; --tx-2:#5C5C58; --tx-3:#8A8A86; --tx-4:#B5B2AA;
  --pos:#2E5B4B; --neg:#A73C3C; --gold:#D6A848; --gold-d:#B58E2E;
  --line:#E2DFD8; --line-strong:#1C1C1A;
  --serif:'Cormorant Garamond', Georgia, serif;
  --sans:'Outfit', system-ui, sans-serif;
  --mono:'JetBrains Mono', ui-monospace, monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg-page);color:var(--tx-1);min-height:100vh;-webkit-font-smoothing:antialiased;font-weight:300;font-size:16px;line-height:1.65}
::selection{background:var(--bg-ink);color:var(--bg-page)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg-page)}
::-webkit-scrollbar-thumb{background:var(--line);}
::-webkit-scrollbar-thumb:hover{background:var(--tx-3)}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(247,245,240,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav-inner{max-width:1480px;margin:0 auto;padding:14px 32px;display:flex;align-items:center;gap:28px}
.brand{font-family:var(--serif);font-size:24px;font-weight:500;letter-spacing:-0.01em;line-height:1;display:flex;align-items:baseline;gap:6px}
.brand .dot{display:inline-block;width:7px;height:7px;background:var(--gold);margin-right:6px;transform:translateY(-3px)}
.brand em{font-style:italic;color:var(--tx-2);font-weight:400}
.nav-tabs{display:flex;gap:0;margin-left:auto;border:1px solid var(--line);background:var(--bg-surface)}
.tab-btn{padding:10px 18px;font-family:var(--sans);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.14em;color:var(--tx-2);background:transparent;border:none;cursor:pointer;border-right:1px solid var(--line);transition:all .15s}
.tab-btn:last-child{border-right:none}
.tab-btn:hover{background:var(--bg-hover);color:var(--tx-1)}
.tab-btn.active{background:var(--bg-ink);color:var(--bg-page)}
.nav-search{display:flex;align-items:center;border:1px solid var(--line);background:var(--bg-surface);padding:8px 12px;gap:8px;min-width:260px}
.nav-search input{border:none;outline:none;background:transparent;font-family:var(--mono);font-size:12px;color:var(--tx-1);width:100%}
.nav-search svg{flex-shrink:0;color:var(--tx-3)}
.live-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--tx-2);padding:6px 10px;border:1px solid var(--line);background:var(--bg-surface);text-transform:uppercase;letter-spacing:0.1em}
.live-pill .dotp{width:6px;height:6px;background:var(--pos);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* LAYOUT */
.container{max-width:1480px;margin:0 auto;padding:32px;display:grid;grid-template-columns:240px 1fr;gap:32px}
.sidebar{position:sticky;top:78px;align-self:start;height:calc(100vh - 110px);overflow-y:auto;padding-right:8px;border-right:1px solid var(--line);padding-top:8px}
.sb-section{margin-bottom:18px}
.sb-head{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.18em;color:var(--tx-3);padding:6px 0 8px;display:flex;align-items:center;gap:8px}
.sb-head::before{content:'';width:14px;height:1px;background:var(--tx-3)}
.sb-item{padding:7px 10px 7px 22px;font-size:13px;color:var(--tx-2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-left:2px solid transparent;transition:all .12s;font-weight:400}
.sb-item:hover{color:var(--tx-1);background:var(--bg-surface);border-left-color:var(--tx-3)}
.sb-item.active{color:var(--tx-1);background:var(--bg-surface);border-left-color:var(--bg-ink);font-weight:500}
.sb-badge{font-family:var(--mono);font-size:8.5px;font-weight:500;padding:2px 5px;text-transform:uppercase;letter-spacing:0.06em;border:1px solid var(--line)}
.b-lead{color:var(--pos);border-color:rgba(46,91,75,0.3)}
.b-coin{color:var(--gold-d);border-color:rgba(181,142,46,0.3)}
.b-lag{color:var(--neg);border-color:rgba(167,60,60,0.3)}
.sb-filter{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.sb-filter button{font-family:var(--mono);font-size:9.5px;padding:5px 9px;background:var(--bg-surface);border:1px solid var(--line);color:var(--tx-2);cursor:pointer;text-transform:uppercase;letter-spacing:0.08em}
.sb-filter button.on{background:var(--bg-ink);color:var(--bg-page);border-color:var(--bg-ink)}

.main{min-width:0}
.page{animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* TYPOGRAPHY */
h1.disp{font-family:var(--serif);font-size:clamp(40px,5vw,68px);font-weight:500;letter-spacing:-0.025em;line-height:0.98;color:var(--tx-1)}
h1.disp em{font-style:italic;color:var(--tx-2);font-weight:400}
h2.sec{font-family:var(--serif);font-size:clamp(28px,3vw,42px);font-weight:500;letter-spacing:-0.02em;line-height:1.08;color:var(--tx-1);margin-bottom:8px}
h2.sec em{font-style:italic;color:var(--tx-2)}
h3.sub{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:-0.01em;color:var(--tx-1)}
.eyebrow{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:0.2em;color:var(--tx-3);margin-bottom:14px;display:inline-flex;align-items:center;gap:10px}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--gold)}
.lede{font-family:var(--serif);font-size:22px;font-weight:400;font-style:italic;line-height:1.45;color:var(--tx-2);max-width:680px}
.prose{font-size:16px;line-height:1.75;color:var(--tx-2);font-weight:300}
.prose strong{color:var(--tx-1);font-weight:500}
.prose p+p{margin-top:14px}

/* CARDS */
.surface{background:var(--bg-surface);border:1px solid var(--line);transition:border-color .2s}
.surface:hover{border-color:var(--line-strong)}
.surface-p{padding:24px 28px}

/* HERO */
.hero{padding:60px 0 40px;border-bottom:1px solid var(--line);margin-bottom:48px;position:relative;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:64px;align-items:end}
.hero-meta{font-family:var(--mono);font-size:10px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.18em;display:flex;gap:20px;margin-bottom:32px}
.hero-meta span::before{content:'·';margin-right:18px;color:var(--tx-4)}
.hero-meta span:first-child::before{display:none}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.hs{padding:20px 0;border-right:1px solid var(--line)}
.hs:last-child{border-right:none;padding-left:20px}
.hs-lbl{font-family:var(--mono);font-size:9.5px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.18em;margin-bottom:8px}
.hs-val{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--tx-1);line-height:1}
.hs-val .unit{font-size:13px;color:var(--tx-3);margin-left:6px}
.hs-delta{font-family:var(--mono);font-size:11px;margin-top:6px}
.dp{color:var(--pos)} .dn{color:var(--neg)}

/* SNAPSHOT EXTENSIONS */
.story-card{background:var(--bg-surface);border:1px solid var(--line);border-left:4px solid var(--gold);padding:26px 32px;margin-bottom:32px}
.story-body{font-family:var(--serif);font-size:20px;font-style:italic;line-height:1.55;color:var(--tx-1);font-weight:400}
.story-body strong{color:var(--tx-1);font-style:normal;font-weight:600;background:rgba(28,28,26,0.06);padding:0 4px}
.story-body em{color:var(--gold-d);font-style:normal;font-weight:500;font-family:var(--mono);font-size:0.9em}

.cat-section{margin-bottom:48px}
.cat-section-head{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 0 12px;border-bottom:1px solid var(--line);margin-bottom:14px}
.cs-cat{font-family:var(--serif);font-size:30px;font-weight:500;color:var(--tx-1);letter-spacing:-0.015em;line-height:1}
.cs-tag{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.16em;color:var(--tx-3);margin-top:8px}
.cs-count{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--tx-3);padding:4px 10px;border:1px solid var(--line);white-space:nowrap;margin-top:4px}
.cs-body{font-size:14.5px;color:var(--tx-2);line-height:1.7;max-width:880px;margin-bottom:16px;font-weight:300}

.ic-val-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ic-edit{background:transparent;border:1px solid var(--line);color:var(--tx-3);width:24px;height:24px;font-size:11px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ic-edit:hover{background:var(--bg-ink);color:var(--bg-page);border-color:var(--bg-ink)}
.ic-val{cursor:pointer;transition:color .15s}
.ic-val:hover{color:var(--gold-d)}
.snap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0;border-top:1px solid var(--line);border-left:1px solid var(--line)}
.ind-card{background:var(--bg-surface);border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:18px 20px 14px;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column;gap:8px;min-height:170px}
.ind-card:hover{background:var(--bg-elev)}
.ic-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ic-name{font-size:12.5px;color:var(--tx-2);font-weight:400;line-height:1.3;letter-spacing:-0.005em}
.ic-cat{font-family:var(--mono);font-size:8.5px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.12em;white-space:nowrap}
.ic-val{font-family:var(--mono);font-size:30px;font-weight:500;color:var(--tx-1);line-height:1;letter-spacing:-0.01em}
.ic-val .u{font-size:12px;color:var(--tx-3);margin-left:4px;font-weight:400}
.ic-meta{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:10px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.1em}
.ic-status{padding:2px 6px;border:1px solid var(--line);font-size:9px}
.ic-status.ok{color:var(--pos);border-color:rgba(46,91,75,0.4)}
.ic-status.warn{color:var(--gold-d);border-color:rgba(181,142,46,0.5)}
.ic-status.bad{color:var(--neg);border-color:rgba(167,60,60,0.4)}
.ic-spark{height:36px;margin-top:auto;position:relative}

/* INPUT */
.inp{font-family:var(--mono);font-size:14px;background:var(--bg-page);border:1px solid var(--line);padding:8px 10px;color:var(--tx-1);width:100%;outline:none}
.inp:focus{border-color:var(--line-strong);background:var(--bg-surface)}
.inp.filled{border-color:var(--bg-ink);background:var(--bg-surface)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;font-family:var(--sans);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;cursor:pointer;border:1px solid var(--bg-ink);transition:all .2s;text-decoration:none}
.btn-primary{background:var(--bg-ink);color:var(--bg-page)}
.btn-primary:hover{background:var(--tx-2);border-color:var(--tx-2)}
.btn-secondary{background:transparent;color:var(--tx-1)}
.btn-secondary:hover{background:var(--bg-ink);color:var(--bg-page)}
.btn-ai{background:var(--bg-elev);color:var(--tx-1);border-color:var(--line);padding:8px 14px;font-size:10px;letter-spacing:0.14em}
.btn-ai:hover{border-color:var(--bg-ink);background:var(--bg-surface)}

/* SCORE */
.score-wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);background:var(--bg-surface);margin-bottom:32px}
.score-cell{padding:32px 36px;border-right:1px solid var(--line)}
.score-cell:last-child{border-right:none}
.score-num{font-family:var(--mono);font-size:68px;font-weight:500;color:var(--tx-1);line-height:1;letter-spacing:-0.03em}
.score-num small{font-size:24px;color:var(--tx-3)}
.score-phase{font-family:var(--serif);font-size:34px;font-style:italic;color:var(--tx-1);font-weight:500;line-height:1.1;margin-top:6px}
.cycle-track{position:relative;height:8px;background:linear-gradient(90deg,#A73C3C 0%,#D6A848 35%,#2E5B4B 65%,#5b8db8 100%);margin:24px 0 12px}
.cycle-dot{position:absolute;top:-6px;width:20px;height:20px;background:var(--bg-surface);border:2px solid var(--bg-ink);transform:translateX(-50%);transition:left .8s ease}
.cycle-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.14em}

/* COMPARE */
.preset-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:14px}
.pr-eyebrow{font-family:var(--mono);font-size:10px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.18em;margin-right:8px}
.preset-btn{font-family:var(--mono);font-size:10.5px;padding:7px 11px;background:var(--bg-surface);border:1px solid var(--line);color:var(--tx-1);cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;transition:all .15s}
.preset-btn:hover{background:var(--bg-ink);color:var(--bg-page);border-color:var(--bg-ink)}
.view-toggle{display:inline-flex;border:1px solid var(--line);background:var(--bg-surface);margin:14px 0 6px}
.vt-btn{font-family:var(--mono);font-size:10.5px;padding:8px 14px;background:transparent;color:var(--tx-2);border:none;border-right:1px solid var(--line);cursor:pointer;text-transform:uppercase;letter-spacing:0.12em;transition:all .15s}
.vt-btn:last-child{border-right:none}
.vt-btn:hover:not(:disabled){background:var(--bg-elev);color:var(--tx-1)}
.vt-btn.on{background:var(--bg-ink);color:var(--bg-page)}
.vt-btn:disabled{opacity:0.4;cursor:not-allowed}
.view-help{font-size:12.5px;color:var(--tx-3);font-style:italic;margin-bottom:12px;line-height:1.55;max-width:880px;font-weight:300}
.cmp-insights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:0;border-top:1px solid var(--line);border-left:1px solid var(--line)}
.insight-card{background:var(--bg-surface);border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:22px 26px;display:flex;flex-direction:column;gap:14px}
.ic-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.ic-pair{font-family:var(--serif);font-size:18px;color:var(--tx-1);font-weight:500;line-height:1.25}
.ic-corr{font-family:var(--mono);font-size:15px;font-weight:500;letter-spacing:-0.01em;padding:4px 10px;border:1px solid currentColor;white-space:nowrap}
.ic-corr.pos{color:var(--pos)}
.ic-corr.neg{color:var(--neg)}
.ic-narr{font-size:14px;color:var(--tx-2);line-height:1.6;font-weight:300}
.ic-narr strong{color:var(--tx-1);font-weight:500}
.ic-stats{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--line);padding-top:14px}
.ic-stats > div{padding-right:14px;border-right:1px solid var(--line)}
.ic-stats > div:last-child{padding-left:14px;border-right:none}
.ic-stats .k{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.14em;color:var(--tx-3);margin-bottom:6px}
.ic-stats .v{font-family:var(--mono);font-size:11px;color:var(--tx-2);display:flex;flex-direction:column;gap:4px}
.ic-stats .v strong{color:var(--tx-1);font-weight:500}
.ic-read{font-size:13px;color:var(--tx-2);line-height:1.65;padding:12px 14px;background:var(--bg-elev);border-left:3px solid var(--gold);font-weight:300}
.ic-read strong{color:var(--tx-1);font-weight:500}
.cmp-bar{display:flex;flex-wrap:wrap;gap:8px;padding:18px;background:var(--bg-surface);border:1px solid var(--line);margin-bottom:0;border-bottom:none;align-items:center}
.cmp-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;background:var(--bg-page);border:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--tx-1)}
.cmp-chip .x{cursor:pointer;color:var(--tx-3);font-size:14px;line-height:1}
.cmp-chip .x:hover{color:var(--neg)}
.cmp-dot{width:9px;height:9px}
.cmp-add{position:relative}
.cmp-add select{font-family:var(--mono);font-size:11px;padding:7px 28px 7px 12px;background:var(--bg-page) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%231C1C1A' stroke-width='1.3' fill='none'/%3E%3C/svg%3E") no-repeat right 10px center;border:1px solid var(--bg-ink);color:var(--tx-1);cursor:pointer;-webkit-appearance:none;appearance:none}
.chart-wrap{background:var(--bg-surface);border:1px solid var(--line);padding:24px 28px;height:460px;position:relative}
.chart-help{display:flex;gap:18px;margin-top:14px;font-family:var(--mono);font-size:10px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.12em}

/* SIMULATE */
.sim-grid{display:grid;grid-template-columns:380px 1fr;gap:24px}
.sim-card{background:var(--bg-surface);border:1px solid var(--line);padding:24px}
.sim-section h4{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:var(--tx-3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.dir-row{display:flex;gap:6px;margin-bottom:14px;align-items:center;justify-content:space-between}
.dir-row .nm{font-size:13px;color:var(--tx-1);flex:1;line-height:1.2}
.dir-btns{display:flex;gap:2px;border:1px solid var(--line)}
.dir-btn{font-family:var(--mono);font-size:10px;padding:6px 9px;background:var(--bg-surface);border:none;border-right:1px solid var(--line);cursor:pointer;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.1em}
.dir-btn:last-child{border-right:none}
.dir-btn.up.on{background:var(--pos);color:#fff}
.dir-btn.dn.on{background:var(--neg);color:#fff}
.dir-btn.fl.on{background:var(--tx-2);color:#fff}
.sim-controls{position:sticky;top:78px;align-self:start;max-height:calc(100vh - 110px);overflow-y:auto;padding-right:6px}
.sim-controls-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.sim-controls-head .ct{font-family:var(--mono);font-size:10px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.16em}
.sim-controls-head button{font-family:var(--mono);font-size:10px;background:transparent;border:none;color:var(--tx-2);cursor:pointer;text-transform:uppercase;letter-spacing:0.14em;text-decoration:underline;text-underline-offset:3px}
.sim-controls-head button:hover{color:var(--neg)}

/* SIM RESULTS */
.sim-prompt{padding:64px 32px;text-align:center;background:var(--bg-surface);border:1px solid var(--line)}
.sim-prompt .num{font-family:var(--mono);font-size:11px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.18em;margin-bottom:14px}
.sim-prompt .em{font-family:var(--serif);font-size:28px;font-style:italic;color:var(--tx-1);margin-bottom:14px;line-height:1.2}
.sim-prompt .hint{font-size:14px;color:var(--tx-2);max-width:460px;margin:0 auto;line-height:1.65;font-weight:300}

.sim-hero{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);background:var(--bg-surface);margin-bottom:24px}
.sim-hero .cell{padding:22px 24px;border-right:1px solid var(--line);position:relative;overflow:hidden;min-height:140px;display:flex;flex-direction:column;justify-content:flex-start;gap:6px}
.sim-hero .cell:last-child{border-right:none}

.sim-hero .cell.pos::before{background:var(--pos)}
.sim-hero .cell.neg::before{background:var(--neg)}
.sim-hero .lbl{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.18em;color:var(--tx-3)}
.sim-hero .nm{font-family:var(--serif);font-size:22px;color:var(--tx-1);line-height:1.15;letter-spacing:-0.01em;font-weight:500;margin:2px 0}
.sim-hero .delta{font-family:var(--mono);font-size:24px;line-height:1;letter-spacing:-0.01em;font-weight:500;margin-top:2px}
.sim-hero .delta.pos{color:var(--pos)}
.sim-hero .delta.neg{color:var(--neg)}
.sim-hero .proj{font-family:var(--mono);font-size:11px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.12em;margin-top:auto;padding-top:6px}

.sankey-wrap{display:none}
.sankey-heads{display:none}
.sankey-svg{display:none}

/* PROJECT-ANY-INDICATOR LOOKUP */
.project-row{background:var(--bg-surface);border:1px solid var(--line);padding:18px 22px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.project-row .pr-label{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:0.16em;color:var(--tx-2);display:flex;align-items:center;gap:8px}
.project-row .pr-label::before{content:'⌖';font-size:18px;color:var(--gold);line-height:1}
.project-row select{font-family:var(--mono);font-size:12px;padding:8px 32px 8px 12px;background:var(--bg-page) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%231C1C1A' stroke-width='1.3' fill='none'/%3E%3C/svg%3E") no-repeat right 12px center;border:1px solid var(--bg-ink);color:var(--tx-1);cursor:pointer;-webkit-appearance:none;appearance:none;min-width:240px}
.pr-result{margin-top:14px;padding:16px 20px;background:var(--bg-elev);border-left:3px solid var(--gold);width:100%;animation:fadeUp .25s ease}
.pr-result.miss{border-left-color:var(--tx-4)}
.pr-result .nm{font-family:var(--serif);font-size:20px;color:var(--tx-1);font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.pr-result .vals{font-family:var(--mono);font-size:13px;color:var(--tx-2);margin-bottom:12px}
.pr-result .vals .arrow{font-weight:500}
.pr-result .vals .arrow.pos{color:var(--pos)}
.pr-result .vals .arrow.neg{color:var(--neg)}
.pr-result .vals .big{font-size:18px;color:var(--tx-1);font-weight:500;letter-spacing:-0.01em}
.pr-result .narr{font-size:13px;color:var(--tx-2);line-height:1.65;font-weight:300;margin-top:6px}
.pr-result .narr strong{color:var(--tx-1);font-weight:500}
.pr-result .actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.pr-result .actions button{font-family:var(--mono);font-size:10px;padding:6px 12px;background:var(--bg-surface);border:1px solid var(--line);color:var(--tx-1);cursor:pointer;text-transform:uppercase;letter-spacing:0.12em}
.pr-result .actions button:hover{border-color:var(--bg-ink);background:var(--bg-ink);color:var(--bg-page)}

/* CASCADE TREE — replacing Sankey */
.cascade-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.cascade-head .ttl{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:0.16em;color:var(--tx-3)}
.cascade-head .meta{font-family:var(--mono);font-size:10px;color:var(--tx-4);text-transform:uppercase;letter-spacing:0.12em}
.cascade-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:0;margin-bottom:24px;border-top:1px solid var(--line);border-left:1px solid var(--line)}
.cascade{background:var(--bg-surface);border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
.cascade-input{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;padding:14px 20px;background:var(--bg-ink);color:var(--bg-page);font-family:var(--serif);font-size:19px;font-weight:500;letter-spacing:-0.01em}
.cascade-input .ci-arrow{font-family:var(--mono);font-size:22px;font-weight:500;width:28px;height:28px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;line-height:0}
.cascade-input.up .ci-arrow{color:#9EC7B6}
.cascade-input.dn .ci-arrow{color:#E0A39A}
.cascade-input .ci-cat{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.14em;color:rgba(251,249,244,0.55)}
.cascade-body{padding:18px 22px 14px}
.cascade-branch{margin-bottom:14px}
.cascade-branch:last-child{margin-bottom:0}
.cascade-1{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:9px 12px;background:var(--bg-page);border:1px solid var(--line);font-size:13.5px;cursor:pointer;transition:all .15s;border-left-width:3px}
.cascade-1.pos{border-left-color:var(--pos)}
.cascade-1.neg{border-left-color:var(--neg)}
.cascade-1:hover{background:var(--bg-elev);border-color:var(--bg-ink)}
.cascade-1 .cn-arrow{font-family:var(--mono);font-size:15px;font-weight:500;width:18px;text-align:center}
.cascade-1.pos .cn-arrow{color:var(--pos)}
.cascade-1.neg .cn-arrow{color:var(--neg)}
.cascade-1 .cn-name{color:var(--tx-1);font-weight:500;letter-spacing:-0.005em}
.cascade-1 .cn-tag{font-family:var(--mono);font-size:9.5px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;padding:2px 6px;border:1px solid var(--line);background:var(--bg-surface)}
.cascade-children{margin:6px 0 0 22px;padding-left:18px;border-left:1px dashed var(--line)}
.cascade-2{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;padding:6px 10px;font-size:12.5px;cursor:pointer;transition:all .15s;position:relative}
.cascade-2::before{content:'';position:absolute;left:-18px;top:50%;width:14px;height:0;border-top:1px dashed var(--line)}
.cascade-2:hover{background:var(--bg-elev)}
.cascade-2 .cn-arrow{font-family:var(--mono);font-size:13px;width:16px;text-align:center;font-weight:500}
.cascade-2.pos .cn-arrow{color:var(--pos)}
.cascade-2.neg .cn-arrow{color:var(--neg)}
.cascade-2 .cn-name{color:var(--tx-2);font-weight:400}
.cascade-2 .cn-tag{font-family:var(--mono);font-size:8.5px;color:var(--tx-4);text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap}
.cascade-empty{padding:18px 22px;color:var(--tx-3);font-style:italic;font-size:13px}
.sankey-edge{fill:none;transition:opacity .2s}
.sankey-edge.dimmed{opacity:0.15}
@keyframes drawSankey{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
.sankey-edge.animate{stroke-dasharray:1000;animation:drawSankey 1.1s ease forwards}

.cat-strip{display:grid;grid-template-columns:repeat(8,1fr);gap:0;border:1px solid var(--line);background:var(--bg-surface);margin-bottom:24px}
.cat-cell{padding:14px 10px;border-right:1px solid var(--line);text-align:center;position:relative;overflow:hidden;transition:background .2s}
.cat-cell:last-child{border-right:none}
.cat-cell .lbl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:var(--tx-3);margin-bottom:8px}
.cat-cell .arr{font-family:var(--mono);font-size:24px;line-height:1;font-weight:500;margin-bottom:4px}
.cat-cell .mag{font-family:var(--mono);font-size:10px;color:var(--tx-2);text-transform:uppercase;letter-spacing:0.1em}
.cat-cell.up .arr{color:var(--pos)} .cat-cell.up{background:rgba(46,91,75,0.05)}
.cat-cell.dn .arr{color:var(--neg)} .cat-cell.dn{background:rgba(167,60,60,0.05)}
.cat-cell.fl .arr{color:var(--tx-4)}

.bars-wrap{background:var(--bg-surface);border:1px solid var(--line);padding:22px 26px;margin-bottom:24px}
.bars-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.bars-head h4{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:var(--tx-3);margin:0}
.bars-head .legend{display:flex;gap:14px;font-family:var(--mono);font-size:9.5px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.12em}
.bars-head .legend span{display:flex;align-items:center;gap:5px}
.bars-head .legend i{width:10px;height:10px;display:inline-block}
.bars-canvas{position:relative}

.affected-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:0;border-top:1px solid var(--line);border-left:1px solid var(--line)}
.aff-card{background:var(--bg-surface);border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;flex-direction:column;gap:10px;transition:background .15s}
.aff-card:hover{background:var(--bg-elev)}
.aff-card .aff-name,.aff-card .aff-vals,.aff-card .aff-delta,.aff-card .aff-mini{cursor:pointer}
.aff-explain-btn{font-family:var(--mono);font-size:9.5px;background:var(--bg-page);border:1px solid var(--line);color:var(--tx-1);padding:6px 10px;cursor:pointer;text-transform:uppercase;letter-spacing:0.12em;align-self:flex-start;margin-top:6px;display:flex;align-items:center;gap:5px;transition:all .15s}
.aff-explain-btn:hover{background:var(--bg-ink);color:var(--bg-page);border-color:var(--bg-ink)}
.aff-explain-btn::after{content:'+';font-family:var(--mono);font-weight:500;transition:transform .2s}
.aff-explain-btn.open::after{content:'×'}
.aff-explain{display:none;background:var(--bg-page);border-left:3px solid var(--gold);padding:14px 16px;font-size:13px;color:var(--tx-2);line-height:1.7;font-weight:300;margin-top:6px;animation:fadeUp .25s}
.aff-explain.open{display:block}
.aff-explain strong{color:var(--tx-1);font-weight:500}
.aff-explain em{color:var(--tx-1);font-style:normal;font-weight:500;background:rgba(214,168,72,0.15);padding:1px 5px}
.aff-explain p+p{margin-top:8px}
.aff-explain .path{font-family:var(--mono);font-size:11px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.1em;padding-top:8px;margin-top:8px;border-top:1px solid var(--line)}
.aff-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.aff-name{font-size:13px;color:var(--tx-2);font-weight:400;line-height:1.3;letter-spacing:-0.005em;flex:1}
.aff-timing{font-family:var(--mono);font-size:8.5px;text-transform:uppercase;letter-spacing:0.12em;color:var(--tx-3);border:1px solid var(--line);padding:3px 6px;white-space:nowrap}
.aff-vals{display:flex;align-items:baseline;gap:10px;font-family:var(--mono);margin-top:2px}
.aff-cur{font-size:13px;color:var(--tx-4);text-decoration:line-through}
.aff-proj{font-size:28px;font-weight:500;letter-spacing:-0.015em;color:var(--tx-1);line-height:1}
.aff-proj .u{font-size:11px;color:var(--tx-3);font-weight:400;margin-left:3px}
.aff-delta{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em}
.aff-delta .d.pos{color:var(--pos)}
.aff-delta .d.neg{color:var(--neg)}
.aff-strength{margin-left:auto;font-family:var(--mono);font-size:9px;padding:3px 7px;border:1px solid var(--line);text-transform:uppercase;letter-spacing:0.12em;color:var(--tx-2)}
.aff-mini{height:32px;position:relative;margin:4px 0}
.aff-mini .axis{position:absolute;top:50%;left:0;right:0;height:1px;background:var(--line)}
.aff-mini .tick{position:absolute;top:50%;transform:translateY(-50%);width:1px;height:9px;background:var(--tx-4)}
.aff-mini .target{position:absolute;top:50%;transform:translateY(-50%);width:7px;height:7px;background:var(--gold);border-radius:50%;z-index:2}
.aff-mini .from{position:absolute;top:50%;transform:translateY(-50%);width:9px;height:9px;background:var(--bg-page);border:2px solid var(--tx-3);border-radius:50%;z-index:3}
.aff-mini .to{position:absolute;top:50%;transform:translateY(-50%);width:11px;height:11px;background:var(--bg-ink);border-radius:50%;z-index:4;transition:left .8s cubic-bezier(.4,0,.2,1)}
.aff-mini .arrow-line{position:absolute;top:50%;height:2px;transform:translateY(-50%);transition:width .8s cubic-bezier(.4,0,.2,1),left .8s cubic-bezier(.4,0,.2,1);z-index:1}
.aff-mini .arrow-line.pos{background:var(--pos)}
.aff-mini .arrow-line.neg{background:var(--neg)}
.aff-chains{font-size:11.5px;color:var(--tx-3);line-height:1.55;border-top:1px solid var(--line);padding-top:10px;margin-top:auto;font-weight:300}
.aff-chains strong{color:var(--tx-2);font-weight:500}

.sim-cta{margin-top:24px;display:flex;gap:10px;flex-wrap:wrap}

/* LEARN */
.learn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:0;border-top:1px solid var(--line);border-left:1px solid var(--line)}
.learn-card{background:var(--bg-surface);border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:24px 26px;cursor:pointer;transition:background .2s;display:flex;flex-direction:column;gap:10px;min-height:200px}
.learn-card:hover{background:var(--bg-elev)}
.lc-cat{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.16em;color:var(--tx-3);display:flex;justify-content:space-between;align-items:center}
.lc-title{font-family:var(--serif);font-size:24px;font-weight:500;letter-spacing:-0.01em;line-height:1.15;color:var(--tx-1)}
.lc-desc{font-size:13.5px;color:var(--tx-2);line-height:1.55;flex:1;font-weight:300}
.lc-more{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:var(--tx-1);display:flex;align-items:center;gap:8px;margin-top:auto}
.lc-more::after{content:'→';font-family:var(--sans)}

/* CTX BANNER (deep-dive context-aware) */
.ctx-banner{padding:18px 56px;border-bottom:1px solid var(--line);background:var(--bg-elev)}
.ctx-banner .ctx-eye{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.18em;color:var(--tx-3);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.ctx-banner .ctx-eye::before{content:'';width:18px;height:1px;background:var(--gold)}
.ctx-banner p{font-family:var(--serif);font-size:18px;font-style:italic;color:var(--tx-1);line-height:1.5;font-weight:400}
.ctx-banner p strong{font-style:normal;font-weight:600;color:var(--tx-1)}
.ctx-banner p em{font-style:normal;font-family:var(--mono);font-size:0.85em;color:var(--gold-d);background:rgba(214,168,72,0.12);padding:1px 5px}
.ctx-snap{background:linear-gradient(180deg,rgba(46,91,75,0.04) 0%,var(--bg-elev) 100%)}
.ctx-sim{background:linear-gradient(180deg,rgba(214,168,72,0.06) 0%,var(--bg-elev) 100%)}
.ctx-cmp{background:linear-gradient(180deg,rgba(28,28,26,0.04) 0%,var(--bg-elev) 100%)}

/* DEEP-DIVE MODAL */
.dd-back{position:fixed;inset:0;background:rgba(28,28,26,0.6);backdrop-filter:blur(6px);z-index:900;display:flex;align-items:flex-start;justify-content:center;padding:40px 24px;overflow-y:auto;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.dd-modal{max-width:980px;width:100%;background:var(--bg-page);border:1px solid var(--line);position:relative;animation:slideUp .35s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.dd-head{padding:48px 56px 28px;border-bottom:1px solid var(--line);background:var(--bg-surface);position:relative}
.dd-close{position:absolute;top:18px;right:18px;width:36px;height:36px;border:1px solid var(--line);background:var(--bg-page);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--tx-2)}
.dd-close:hover{border-color:var(--bg-ink);color:var(--tx-1)}
.dd-eyebrow{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:0.18em;color:var(--tx-3);margin-bottom:14px;display:flex;gap:16px}
.dd-eyebrow span+span::before{content:'·';margin-right:14px;color:var(--tx-4)}
.dd-title{font-family:var(--serif);font-size:46px;font-weight:500;letter-spacing:-0.022em;line-height:1.04;color:var(--tx-1);margin-bottom:18px}
.dd-lede{font-family:var(--serif);font-size:19px;font-style:italic;color:var(--tx-2);max-width:640px;line-height:1.5;font-weight:400}
.dd-body{display:grid;grid-template-columns:1.6fr 1fr;gap:48px;padding:40px 56px}
.dd-section{margin-bottom:32px}
.dd-section h4{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.18em;color:var(--tx-3);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.dd-section p,.dd-section li{font-size:15.5px;line-height:1.75;color:var(--tx-2);font-weight:300}
.dd-section ul{padding-left:18px;margin-top:8px}
.dd-section li{margin-bottom:6px}
.dd-section strong{color:var(--tx-1);font-weight:500}
.dd-cheatsheet{background:var(--bg-surface);border:1px solid var(--line);padding:28px;position:sticky;top:24px;align-self:start}
.dd-cheatsheet h5{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.18em;color:var(--tx-3);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.cs-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;align-items:baseline;gap:12px}
.cs-row:last-of-type{border-bottom:none}
.cs-row .k{color:var(--tx-3);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;flex-shrink:0}
.cs-row .v{font-family:var(--mono);color:var(--tx-1);text-align:right;font-size:12.5px}
.cs-chart{height:120px;margin-top:18px;padding-top:18px;border-top:1px solid var(--line)}
.dd-current{font-family:var(--mono);font-size:42px;font-weight:500;color:var(--tx-1);line-height:1;margin-bottom:8px;letter-spacing:-0.02em}
.dd-current .u{font-size:14px;color:var(--tx-3);margin-left:6px;font-weight:400}
.dd-pos{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--tx-2);padding:5px 0;border-top:1px solid var(--line);margin-top:4px}

/* DATA FETCH PANEL */
.fetch-panel{background:var(--bg-elev);border:1px solid var(--line);padding:22px 26px;margin-bottom:22px}
.fp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.fp-title{font-family:var(--serif);font-size:20px;font-style:italic;color:var(--tx-1)}
.fp-actions{display:flex;gap:8px;flex-wrap:wrap}

/* QUIZ */
/* QUIZ */

.qc-btn{font-family:var(--mono);font-size:10.5px;padding:8px 12px;background:var(--bg-surface);border:1px solid var(--line);color:var(--tx-1);cursor:pointer;text-transform:uppercase;letter-spacing:0.12em;display:flex;align-items:center;gap:8px;transition:all .15s}

.quiz-meta{display:flex;align-items:center;gap:18px;margin-bottom:18px}

.qm-bar{flex:1;height:3px;background:var(--line);position:relative;overflow:hidden}

.q-diagram svg{max-width:100%;height:auto}
.quiz-card{background:var(--bg-surface);border:1px solid var(--line);padding:32px 36px;margin-bottom:18px}
.q-question{font-family:var(--serif);font-size:24px;line-height:1.3;font-weight:500;color:var(--tx-1);margin-bottom:22px;letter-spacing:-0.01em}
.q-options{display:flex;flex-direction:column;gap:8px}
.q-opt{padding:14px 18px;border:1px solid var(--line);background:var(--bg-page);cursor:pointer;text-align:left;font-family:var(--sans);font-size:14px;color:var(--tx-1);transition:all .15s}
.q-opt:hover{border-color:var(--bg-ink)}
.q-opt.correct{background:rgba(46,91,75,0.1);border-color:var(--pos);color:var(--pos)}
.q-opt.wrong{background:rgba(167,60,60,0.08);border-color:var(--neg);color:var(--neg)}
.q-explain{margin-top:18px;padding:16px;background:var(--bg-elev);border-left:3px solid var(--gold);font-size:14px;color:var(--tx-2);line-height:1.6}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--line);border-left:1px solid var(--line);margin-bottom:60px}
.about-cell{padding:32px 36px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--bg-surface)}
.about-cell h4{font-family:var(--serif);font-size:24px;font-weight:500;margin-bottom:12px;color:var(--tx-1)}
.about-cell p{color:var(--tx-2);font-size:15px;line-height:1.7;font-weight:300}
.persona-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);background:var(--bg-surface);margin-bottom:32px}
.persona{padding:28px;border-right:1px solid var(--line);text-align:center}
.persona:last-child{border-right:none}
.persona .n{font-family:var(--mono);font-size:32px;color:var(--gold-d);margin-bottom:8px;font-weight:500}
.persona .l{font-family:var(--serif);font-size:18px;color:var(--tx-1);margin-bottom:4px}
.persona .d{font-size:12.5px;color:var(--tx-3);line-height:1.5}

/* HEATMAP */
.heat-wrap{background:var(--bg-surface);border:1px solid var(--line);padding:28px;overflow-x:auto}
.heat-tbl{border-collapse:collapse;width:100%;font-family:var(--mono);font-size:10px}
.heat-tbl th,.heat-tbl td{padding:6px 8px;text-align:center;border:1px solid var(--line);color:var(--tx-2)}
.heat-tbl th{background:var(--bg-elev);color:var(--tx-3);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;font-size:9px}
.heat-tbl th.rh{text-align:left;font-size:9px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.heat-cell{width:36px;height:36px;display:block;text-align:center;line-height:24px}

/* DISCLAIMER */
.disc{font-size:12px;color:var(--tx-3);line-height:1.7;padding:24px;border:1px dashed var(--line);background:var(--bg-elev);font-weight:300}

/* LOADER */
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--line);border-top-color:var(--bg-ink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:1100px){
  .sim-grid{grid-template-columns:1fr}
  .sim-controls{position:static;max-height:none}
  .sim-hero{grid-template-columns:1fr}
  .sim-hero .cell{border-right:none;border-bottom:1px solid var(--line)}
  .cat-strip{grid-template-columns:repeat(4,1fr)}
  .cat-cell:nth-child(4n){border-right:none}
  .cat-cell:nth-child(-n+4){border-bottom:1px solid var(--line)}
  .dd-body{grid-template-columns:1fr;padding:32px}
  .hero-grid{grid-template-columns:1fr;gap:32px}
}
@media(max-width:900px){
  .container{grid-template-columns:1fr;padding:18px}
  .sidebar{display:none}
  .nav-inner{padding:12px 18px;flex-wrap:wrap;gap:14px}
  .nav-search{display:none}
  .about-grid{grid-template-columns:1fr}
  .persona-row{grid-template-columns:1fr}
  .score-wrap{grid-template-columns:1fr}
  .score-cell{border-right:none;border-bottom:1px solid var(--line)}
  .dd-modal{margin:0}
  .dd-head{padding:32px 24px 20px}
  .dd-body{padding:24px}
}
</style>

<script>
// ─── INDICATOR DATA ─────────────────────────────────
const CATS = {
  gdp:{label:'GDP & Growth',short:'GDP'},
  inflation:{label:'Inflation',short:'INF'},
  monetary:{label:'Monetary Policy',short:'MON'},
  labor:{label:'Employment',short:'LAB'},
  trade:{label:'External Trade',short:'TRD'},
  fiscal:{label:'Government',short:'FIS'},
  business:{label:'Business Activity',short:'BUS'},

// type: lead/coin/lag. wb: world bank code (annual) or null. fb: fallback value with date.
const INDICATORS = [
  {id:'quarterly_gdp_growth',cat:'gdp',name:'Quarterly GDP Growth',unit:'%',type:'coin',
   target:7,wl:5,wh:9,wb:null,fb:{v:7.4,d:'Q2 FY26'},
   what:'How fast India\'s economy grew in the latest quarter compared with the same quarter last year.',
   why:'Captures the freshest economic momentum. It\'s the first big signal that the cycle is turning up — or down — before annual numbers catch up.',
   example:'When quarterly GDP jumped from 6.1% to 7.4%, markets sniffed an accelerating cycle six months before annual numbers confirmed it.',
   how:'Look for two consecutive surprises in the same direction. A single beat can be a base effect; a trend is a turn.',

   impacts:[{to:'unemployment',str:'high',dir:'neg',note:'Faster growth absorbs labour slack'},{to:'loan_growth',str:'high',dir:'pos',note:'Demand for credit rises'},{to:'fiscal_deficit',str:'mid',dir:'neg',note:'Tax buoyancy improves'}]},
  {id:'gdp_growth',cat:'gdp',name:'Annual GDP Growth',unit:'%',type:'coin',
   target:7,wl:5,wh:9,wb:'NY.GDP.MKTP.KD.ZG',fb:{v:6.5,d:'FY25'},
   what:'The full-year change in the inflation-adjusted value of everything India produces.',
   why:'The headline scorecard. Above 7% places India among the world\'s fastest growers; below 5% raises red flags about lost momentum and unemployment.',

  {id:'gfcf',cat:'gdp',name:'Gross Fixed Capital Formation',unit:'% of GDP',type:'lead',

   what:'Monthly merchandise exports minus imports. India\'s number is structurally negative because of oil.',

  {id:'business_conf',cat:'business',name:'Business Confidence',unit:'index',type:'lead',

   example:'Business confidence at 112 in Q4 FY25 predicted the strong capex cycle announced in FY26.',
   how:'Compare expectations vs current assessment. Optimism about the future = leading signal.',

   impacts:[{to:'gfcf',str:'high',dir:'pos'},{to:'unemployment',str:'mid',dir:'neg'}]},
  {id:'consumer_conf',cat:'consumer',name:'Consumer Confidence',unit:'index',type:'lead',

   why:'Confident consumers spend; anxious ones save. Sentiment leads spending by one quarter.',

const IND_MAP = Object.fromEntries(INDICATORS.map(i=>[i.id,i]));

const state = {

function clearCharts(){

function fmtNum(v,unit){
  if(v==null||isNaN(v)) return '—';
  let s = (typeof v==='number') ? (Math.abs(v)>=100 ? v.toFixed(1) : Math.abs(v)>=10? v.toFixed(2) : v.toFixed(2)) : v;
  return s;
}
function statusOf(ind,v){
  if(v==null||isNaN(v)) return {cls:'',txt:'—'};
  const {wl,wh,target}=ind;
  const lo=Math.min(wl,wh), hi=Math.max(wl,wh);
  if(v<lo||v>hi) return {cls:'bad',txt:'Outside'};
  const d=Math.abs(v-target)/Math.max(1,Math.abs(hi-lo));
  if(d<0.25) return {cls:'ok',txt:'On target'};
  return {cls:'warn',txt:'Drifting'};
}

// ─── LIVE DATA: BACKEND PROXY (annual WB + monthly IMF/IFS via DBnomics) ─
// NOTE (GitHub Pages): The original backend proxy (/api/macro/indicators) is a
// server-side endpoint that cannot run on GitHub Pages (static hosting only).
// loadLiveData() now goes straight to the public World Bank API (CORS-enabled).
// Monthly indicators that were served by the backend fall back to their hardcoded
// fallback values (fb.v) — those values are still shown and editable in the UI.
async function loadLiveData(){
  document.getElementById('liveTxt').textContent = 'Fetching latest data…';
  await loadLiveDataDirect();
  // Synthetic histories for indicators with no live source
  INDICATORS.forEach(ind=>{
    if(!state.history[ind.id]){
      const base = ind.fb.v, range = (ind.wh-ind.wl)*0.4;
      const points = [];
      for(let i=10;i>=0;i--){
        const yr = new Date().getFullYear()-i;
        const noise = (Math.sin(i*1.3)+Math.cos(i*0.7))*range*0.25;
        const drift = (10-i)*0.02*range;
        points.push({year:String(yr), value: +(base - drift*0.5 + noise).toFixed(2)});
      }
      points[points.length-1].value = base;
      state.history[ind.id]=points;
    }
  });
  state.loaded=true;
  if(state.tab==='snapshot') renderSnapshot();
  if(state.tab==='compare') renderCompare();
}
// Fetches live annual data directly from the World Bank open API (CORS-enabled, no key needed).
// This is the primary data path on GitHub Pages.
async function loadLiveDataDirect(){
  const live = INDICATORS.filter(i=>i.wb);
  let loaded = 0;
  await Promise.all(live.map(async ind=>{
    try{
      const r = await fetch(`https://api.worldbank.org/v2/country/IN/indicator/${ind.wb}?format=json&per_page=30`);
      if(!r.ok) throw new Error('HTTP '+r.status);
      const j = await r.json();
      if(!j[1]) return;
      const points = j[1].filter(d=>d.value!=null).map(d=>({year:String(d.date), value:+d.value})).sort((a,b)=>a.year.localeCompare(b.year));
      if(points.length){
        state.history[ind.id]=points;
        state.values[ind.id]=points[points.length-1].value;
        IND_MAP[ind.id]._period = points[points.length-1].year;
        IND_MAP[ind.id]._source = 'World Bank';
        loaded++;
      }
    }catch(e){console.warn('WB direct fail',ind.id,e);}
  }));
  const dateStr = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  if(loaded > 0){
    document.getElementById('liveTxt').textContent = `Live · ${loaded} from World Bank · ${dateStr}`;
  } else {
    document.getElementById('liveTxt').textContent = `Fallback data · ${dateStr}`;
  }
}

// Parse markdown table response from ChatGPT/Gemini
function parsePastedAI(){
  const text = document.getElementById('aiPaste').value || '';
  const status = document.getElementById('parseStatus');
  if(!text.trim()){ status.textContent = 'Paste a response first.'; status.style.color = 'var(--neg)'; return; }
  status.textContent = 'Parsing…'; status.style.color = 'var(--tx-3)';

  // Normalise indicator names for matching
  const norm = (s)=> s.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
  const indMap = INDICATORS.map(i=>({id: i.id, key: norm(i.name), unit: i.unit, ind: i}));

  // Pull lines that look like markdown table rows
  const lines = text.split(/\r?\n/).filter(l=>{
    const t = l.trim();
    if(!t.startsWith('|')) return false;
    if(/^\|\s*-+/.test(t)) return false; // separator
    if(/indicator\s*\|\s*value/i.test(t)) return false; // header
    return true;
  });

  const matched = [];
  const unmatched = [];

  lines.forEach(line=>{
    // Split by |, trim each cell, drop empties
    const cells = line.split('|').map(c=>c.trim()).filter(c=>c.length);
    if(cells.length < 2) return;
    const nameCell = cells[0], valueCell = cells[1];
    if(!nameCell || !valueCell) return;
    // Strip parens like "(% YoY)" from name
    const nameClean = nameCell.replace(/\([^)]*\)/g,'').trim();
    const nameKey = norm(nameClean);
    if(!nameKey) return;

    // Find best fuzzy match
    let best = null, bestScore = 0;
    indMap.forEach(im=>{
      const a = nameKey, b = im.key;
      // simple Dice coefficient on bigrams
      const bigrams = (s)=> { const set = new Set(); for(let i=0;i<s.length-1;i++) set.add(s.slice(i,i+2)); return set; };
      const A = bigrams(a), B = bigrams(b);
      let inter = 0; A.forEach(x=>{ if(B.has(x)) inter++; });
      const score = (2*inter) / (A.size + B.size || 1);
      // bonus for exact substring
      const sub = (a.includes(b) || b.includes(a)) ? 0.15 : 0;
      const total = score + sub;
      if(total > bestScore){ bestScore = total; best = im; }
    });
    if(!best || bestScore < 0.45){ unmatched.push(nameCell); return; }

    // Parse value: strip ₹ $ % , and units; pick first signed number
    const cleanedVal = valueCell.replace(/[₹$,]/g,'').replace(/[\u2212]/g,'-');
    const m = cleanedVal.match(/-?\d+(?:\.\d+)?/);
    if(!m){ unmatched.push(nameCell); return; }
    let v = parseFloat(m[0]);
    // Heuristic: if the value cell mentions "trillion" or "billion" or "crore" and unit is USD Bn / yr, adjust
    if(/trillion/i.test(valueCell) && best.unit && best.unit.includes('Bn')) v *= 1000;
    if(/lakh\s*cr/i.test(valueCell) && best.unit==='% YoY') {/* skip — wrong unit */}

    state.values[best.id] = v;
    matched.push(best.ind.name + ' = ' + v);
  });

  if(matched.length){
    const msg = `Matched ${matched.length} of ${matched.length + unmatched.length} rows. Snapshot updated.`;
    renderSnapshot();
    // Re-open paste panel and re-set status
    const host = document.getElementById('pasteHost');
    if(host) host.style.display = 'block';
    const s2 = document.getElementById('parseStatus');
    if(s2){ s2.textContent = msg; s2.style.color = 'var(--pos)'; }
    const ta = document.getElementById('aiPaste');
    if(ta) ta.value = text;
  } else {
    status.textContent = `Could not parse any rows. Make sure the response is a markdown table (| Indicator | Value | …).`;
    status.style.color = 'var(--neg)';
  }
}

function generateStory(){
  const gdp = state.values.gdp_growth, inf = state.values.inflation, repo = state.values.interest_rate;
  const pmiM = state.values.pmi_mfg, pmiS = state.values.pmi_services;
  const unemp = state.values.unemployment, fx = state.values.forex;
  const tb = state.values.trade_balance, fdi = state.values.fdi, capex = state.values.govt_spending;
  const parts = [];

  // Growth + inflation framing
  const growthOK = gdp >= 6.5, infHigh = inf >= 5.5, infOK = inf <= 4.5;
  if(growthOK && infOK){
    parts.push(`India is in a <strong>goldilocks moment</strong>: real GDP growing at <em>${gdp.toFixed(1)}%</em> with CPI inflation tame at <em>${inf.toFixed(1)}%</em>. The RBI repo rate at <em>${repo.toFixed(2)}%</em> leaves room to cut if growth needs support.`);
  } else if(growthOK && infHigh){
    parts.push(`Growth is strong (<em>${gdp.toFixed(1)}%</em> GDP) but inflation is <strong>uncomfortable</strong> at <em>${inf.toFixed(1)}%</em>. Expect the RBI's repo rate (currently <em>${repo.toFixed(2)}%</em>) to stay restrictive until prices cool.`);
  } else if(!growthOK && infHigh){
    parts.push(`Stagflation risk is rising: GDP growth at <em>${gdp.toFixed(1)}%</em> is below India's potential while inflation at <em>${inf.toFixed(1)}%</em> remains uncomfortable. This is the hardest macro environment to navigate.`);
  } else {
    parts.push(`The economy is in a <strong>cooling phase</strong>: GDP at <em>${gdp.toFixed(1)}%</em>, inflation at <em>${inf.toFixed(1)}%</em>. RBI has scope to support growth at the next policy meeting.`);
  }

  // Business activity
  if(pmiM >= 55 && pmiS >= 55){
    parts.push(`Both Manufacturing (PMI <em>${pmiM.toFixed(1)}</em>) and Services (<em>${pmiS.toFixed(1)}</em>) are expanding — broad-based momentum.`);
  } else if(pmiS >= 55 && pmiM < 52){
    parts.push(`Services (PMI <em>${pmiS.toFixed(1)}</em>) are doing the heavy lifting; manufacturing (<em>${pmiM.toFixed(1)}</em>) is sluggish.`);
  }

  // External
  if(fx >= 650){
    parts.push(`External buffer is strong with <em>$${fx.toFixed(0)}B</em> in forex reserves (~${(fx/60).toFixed(1)} months of imports).`);
  }
  if(tb <= -25){
    parts.push(`Trade deficit is wide at <em>$${tb.toFixed(1)}B/month</em>, which could weigh on the rupee if exports don't pick up.`);
  }

  // FDI / capex
  if(fdi >= 70 && capex >= 10){
    parts.push(`Investment story holds: FDI at <em>$${fdi.toFixed(0)}B</em> and government capex growth at <em>${capex.toFixed(1)}%</em> are both supportive.`);
  }

  parts.push(`<span style="color:var(--tx-3)">Read each indicator below for the full deep-dive, or open the Compare tab to see how these numbers relate over time.</span>`);
  return parts.join(' ');
}

function computeScore(){
  let total=0,n=0;
  INDICATORS.forEach(ind=>{
    const v = state.values[ind.id];
    if(v==null||isNaN(v)) return;
    const range = Math.max(1,Math.abs(ind.wh-ind.wl));
    const d = Math.abs(v-ind.target)/range;
    const s = Math.max(0, Math.min(100, 100-d*220));
    total+=s; n++;
  });
  return n? Math.round(total/n):0;
}
function computePhase(){
  const gdp = state.values.gdp_growth, inf = state.values.inflation, pmi = state.values.pmi_mfg, unemp = state.values.unemployment;
  const growthGood = gdp>=6.5, infOK = inf<=5.5, pmiExp = pmi>=52, jobsOK = unemp<=7;
  let pos, name;
  if(growthGood && infOK && pmiExp){ pos=78; name='Expansion'; }
  else if(growthGood && !infOK){ pos=92; name='Late-cycle peak'; }
  else if(!growthGood && !infOK){ pos=22; name='Stagflation risk'; }
  else if(!growthGood && infOK && jobsOK){ pos=42; name='Soft landing'; }
  else if(!growthGood && infOK && !jobsOK){ pos=10; name='Contraction'; }
  else { pos=58; name='Mid-cycle'; }
  return {pos,name};
}

  const vals = series.map(d=>d.value);

  return series.map(d=>({year:d.year, value:(d.value - m)/sd}));
}

function corrAndLag(seriesA, seriesB, maxLag){
  // Compute Pearson at various lags, return best
  const mA = new Map(seriesA.map(d=>[d.year,d.value])), mB = new Map(seriesB.map(d=>[d.year,d.value]));
  const yrs = [...mA.keys()].filter(y=>mB.has(y)).sort();
  if(yrs.length < 4) return null;
  function corrAt(lag){
    const pairs = [];
    yrs.forEach(y=>{
      // For annual data 'y' might be string like "2020" or "2025-06" — try numeric offset
      let next;
      if(/^\d{4}$/.test(String(y))){
        next = String(parseInt(y)+lag);
      } else if(/^\d{4}-\d{2}$/.test(String(y))){
        const [yy,mm] = String(y).split('-').map(Number);
        const tot = yy*12 + mm + lag;
        next = `${Math.floor(tot/12)}-${String(((tot-1)%12)+1).padStart(2,'0')}`;
      } else next = y;
      if(mB.has(next)) pairs.push({a:mA.get(y), b:mB.get(next)});
    });
    if(pairs.length < 4) return null;
    const aMean = pairs.reduce((s,p)=>s+p.a,0)/pairs.length;
    const bMean = pairs.reduce((s,p)=>s+p.b,0)/pairs.length;
    let n=0,da=0,db=0;
    pairs.forEach(p=>{ n+=(p.a-aMean)*(p.b-bMean); da+=(p.a-aMean)**2; db+=(p.b-bMean)**2; });
    return da&&db ? {corr: n/Math.sqrt(da*db), n: pairs.length} : null;
  }
  let best = {lag: 0, ...corrAt(0)};
  for(let l = -maxLag; l <= maxLag; l++){
    if(l===0) continue;
    const r = corrAt(l);
    if(r && Math.abs(r.corr) > Math.abs(best.corr || 0)) best = {lag: l, ...r};
  }
  return best;
}

function recentSlope(series, n){
  const tail = series.slice(-n);
  if(tail.length < 3) return null;
  const ys = tail.map((d,i)=>d.value);
  const xs = tail.map((_,i)=>i);
  const xm = xs.reduce((s,x)=>s+x,0)/xs.length;
  const ym = ys.reduce((s,y)=>s+y,0)/ys.length;
  let num=0, den=0;
  for(let i=0;i<xs.length;i++){ num+=(xs[i]-xm)*(ys[i]-ym); den+=(xs[i]-xm)**2; }
  return den? num/den : 0;
}

function stdDev(series){
  if(!series.length) return 0;
  const m = series.reduce((s,d)=>s+d.value,0)/series.length;
  return Math.sqrt(series.reduce((s,d)=>s+(d.value-m)**2,0)/series.length);
}

function buildInsightCards(chosen){
  if(chosen.length < 2) return '<div class="prose" style="font-style:italic;color:var(--tx-3);padding:14px">Add a second indicator to see relationship insights.</div>';
  const cards = [];
  for(let i=0;i<chosen.length-1;i++){
    for(let j=i+1;j<chosen.length;j++){
      const a = chosen[i], b = chosen[j];
      const seriesA = state.history[a.id]||[], seriesB = state.history[b.id]||[];
      const cl = corrAndLag(seriesA, seriesB, 3);
      if(!cl) continue;
      const strength = Math.abs(cl.corr)>0.7?'strongly':Math.abs(cl.corr)>0.4?'meaningfully':Math.abs(cl.corr)>0.2?'weakly':'barely';
      const direction = cl.corr > 0 ? 'together' : 'in opposite directions';
      const lagText = cl.lag === 0 ? 'simultaneously'
        : cl.lag > 0 ? `with <strong>${a.name}</strong> leading by ${cl.lag} period${cl.lag>1?'s':''}`
        : `with <strong>${b.name}</strong> leading by ${-cl.lag} period${-cl.lag>1?'s':''}`;
      const volA = stdDev(seriesA).toFixed(2);
      const volB = stdDev(seriesB).toFixed(2);
      const slopeA = recentSlope(seriesA, 5);
      const slopeB = recentSlope(seriesB, 5);
      const slopeAW = slopeA == null ? '—' : (slopeA>0?'↑':'↓') + ' ' + Math.abs(slopeA).toFixed(2);
      const slopeBW = slopeB == null ? '—' : (slopeB>0?'↑':'↓') + ' ' + Math.abs(slopeB).toFixed(2);
      const conv = slopeA != null && slopeB != null && Math.sign(slopeA) === Math.sign(slopeB);
      cards.push(`
        <div class="insight-card" data-testid="insight-${a.id}-${b.id}">
          <div class="ic-head">
            <div class="ic-pair"><strong>${a.name}</strong> &times; <strong>${b.name}</strong></div>
            <div class="ic-corr ${cl.corr>0?'pos':'neg'}">r = ${cl.corr.toFixed(2)}</div>
          </div>
          <p class="ic-narr">These two indicators ${strength} move ${direction} over <strong>${cl.n} overlapping observations</strong>, ${lagText}.</p>
          <div class="ic-stats">
            <div><div class="k">Recent 5-period trend</div><div class="v"><span>${a.name}: <strong>${slopeAW}</strong></span><span>${b.name}: <strong>${slopeBW}</strong></span></div></div>
            <div><div class="k">Volatility (σ)</div><div class="v"><span>${a.name}: <strong>${volA}</strong></span><span>${b.name}: <strong>${volB}</strong></span></div></div>
          </div>
          <p class="ic-read">${interpretPair(a, b, cl, conv)}</p>
        </div>`);
    }
  }
  return cards.join('') || '<div class="prose" style="color:var(--tx-3);padding:14px;font-style:italic">Not enough overlapping data points to compute relationships.</div>';
}

    'inflation|interest_rate': 'Classic monetary transmission: RBI hikes when inflation runs hot; cuts when it cools.',
    'gdp_growth|unemployment': 'Okun\'s law in India: 1pp of GDP growth above potential typically lowers unemployment by ~0.2pp. The relationship is weaker than in OECD economies because of India\'s informal sector.',
    'unemployment|gdp_growth': 'Okun\'s law: faster growth typically reduces unemployment, though India\'s informal labour market dampens the link.',
    'pmi_mfg|industrial_prod': 'PMI is the leading edge of IIP. A 3-month moving average of PMI tends to anticipate IIP turns by 4–6 weeks.',
    'gfcf|gdp_growth': 'Capital formation is what compounds into future growth. Sustained 32%+ GFCF is what locks in 7% real GDP.',
    'fdi|forex': 'FDI inflows directly boost reserves, but the link weakens when capital outflows from FPIs dominate the FX balance.',
    'trade_balance|forex': 'A wider goods deficit drains dollars unless offset by services exports and FDI. Forex reserves should fall in years when the trade deficit blows out.',
    'exports|forex': 'Stronger goods exports bring dollars in, supporting reserves and the rupee.',
    'consumer_conf|consumer_spending': 'Confidence leads spending by roughly one quarter — households decide before they swipe.',
  };
  const key1 = a.id+'|'+b.id, key2 = b.id+'|'+a.id;
  if(known[key1]) return `<strong>What to read:</strong> ${known[key1]}`;
  if(known[key2]) return `<strong>What to read:</strong> ${known[key2]}`;
  // Generic
  const dir = cl.corr > 0 ? 'reinforce each other' : 'pull in opposite directions';
  const convPart = conv ? 'and their recent 5-period trends are converging in the same direction — a continuation signal' : 'but their recent trends are diverging, hinting at a regime change';
  return `<strong>What to read:</strong> Across recent history these two ${dir} ${convPart}. Use Simulate to test which one moves first if you change the other.`;
}

function compareNarrative(chosen){
  if(chosen.length < 2) return 'Pick at least two indicators to see how they relate.';
  return `Pair-by-pair insights above analyse each combination across overlapping history. <strong>Time-series view</strong> shows raw levels (best for tracking absolute values), <strong>normalised view</strong> rescales each series so different units sit on the same y-axis (best for pattern matching), and <strong>scatter view</strong> plots one indicator against another to surface non-linear relationships. The correlation coefficient (r) ranges from -1 to +1; magnitudes above 0.7 are strong, 0.4–0.7 meaningful, below 0.2 essentially noise. Always remember: correlation is a clue, not a verdict — Indian macro is full of structural breaks that flip historical patterns.`;
}

// ─── SIMULATE ──────────────────────────────────────
const STR_MULT = {high: 1.0, mid: 0.6, low: 0.3};
const STR_NUM  = {high: 3, mid: 2, low: 1};
const TIMING   = {lead: '1–2 quarters', coin: '2–4 quarters', lag: '4–8 quarters'};
const MAG_LABEL = (m)=> m>=0.6?'Strong': m>=0.25?'Moderate': m>=0.08?'Mild':'Faint';

function indicatorScale(ind){
  return Math.max(0.4, Math.abs(ind.wh - ind.wl) / 4);
}

function computeRipple(){
  const inputs = Object.entries(state.forecast)
    .filter(([,d])=>d && d!=='flat')
    .map(([id, dir])=>({id, dir, ind: IND_MAP[id]}))
    .filter(x=>x.ind);
  if(!inputs.length) return null;

  const inputIds = new Set(inputs.map(i=>i.id));
  const effects = new Map(); // targetId -> {target, amount, contributions[]}

  function add(targetId, target, amount, contrib){
    if(!effects.has(targetId)) effects.set(targetId, {target, amount: 0, contributions: []});
    const e = effects.get(targetId); e.amount += amount; e.contributions.push(contrib);
  }

  // 1st-order
  const firstOrderEdges = [];
  inputs.forEach(inp=>{
    const dirSign = inp.dir === 'up' ? 1 : -1;
    (inp.ind.impacts || []).forEach(imp=>{
      const tgt = IND_MAP[imp.to]; if(!tgt) return;
      const strMult = STR_MULT[imp.str] || 0.5;
      const sign = dirSign * (imp.dir === 'pos' ? 1 : -1);
      const amount = sign * strMult * indicatorScale(tgt);
      add(imp.to, tgt, amount, {hop:1, from: inp.ind, str: imp.str, sign, amount, note: imp.note});
      firstOrderEdges.push({src: inp.ind, dst: tgt, str: imp.str, sign, amount});
    });
  });

  // 2nd-order — only target indicators NOT already in inputs (avoid circular)
  const secondOrderEdges = [];
  const firstSnap = Array.from(effects.values()).map(e=>({...e}));
  firstSnap.forEach(eff=>{
    const sign1 = eff.amount >= 0 ? 1 : -1;
    const mag1 = Math.min(1, Math.abs(eff.amount) / indicatorScale(eff.target));
    (eff.target.impacts || []).forEach(imp=>{
      const tgt = IND_MAP[imp.to]; if(!tgt) return;
      if(inputIds.has(tgt.id)) return;
      const strMult = STR_MULT[imp.str] || 0.5;
      const sign = sign1 * (imp.dir === 'pos' ? 1 : -1);
      const amount = sign * strMult * mag1 * indicatorScale(tgt) * 0.6;
      if(Math.abs(amount) < 0.08) return;
      add(imp.to, tgt, amount, {hop:2, from: eff.target, via: eff.target, str: imp.str, sign, amount});
      secondOrderEdges.push({src: eff.target, dst: tgt, str: imp.str, sign, amount});
    });
  });

  const list = Array.from(effects.values()).sort((a,b)=>Math.abs(b.amount)-Math.abs(a.amount));

  // Category aggregation
  const catAgg = {};
  Object.keys(CATS).forEach(c=> catAgg[c] = {sum:0, count:0});
  list.forEach(e=>{
    const norm = e.amount / indicatorScale(e.target);
    catAgg[e.target.cat].sum += norm; catAgg[e.target.cat].count++;
  });

  return {inputs, effects:list, firstOrderEdges, secondOrderEdges, catAgg};
}

// ─── CASCADE TREE BUILDER ───────────────────────
function buildCascades(ripple){
  // For each input, build a clean tree: input → 1st-order children → 2nd-order grandchildren
  const inputIds = new Set(ripple.inputs.map(i=>i.id));
  return ripple.inputs.map(inp=>{
    const dirSign = inp.dir === 'up' ? 1 : -1;
    const firstOrder = (inp.ind.impacts || []).map(imp=>{
      const tgt = IND_MAP[imp.to]; if(!tgt) return null;
      const strMult = STR_MULT[imp.str] || 0.5;
      const sign = dirSign * (imp.dir === 'pos' ? 1 : -1);
      const amount = sign * strMult * indicatorScale(tgt);
      const mag1 = Math.min(1, Math.abs(amount) / indicatorScale(tgt));
      const secondOrder = (tgt.impacts || []).map(imp2=>{
        const t2 = IND_MAP[imp2.to]; if(!t2) return null;
        if(inputIds.has(t2.id)) return null;
        const strMult2 = STR_MULT[imp2.str] || 0.5;
        const sign2 = sign * (imp2.dir === 'pos' ? 1 : -1);
        const amount2 = sign2 * strMult2 * mag1 * indicatorScale(t2) * 0.6;
        if(Math.abs(amount2) < 0.05) return null;
        return {tgt: t2, str: imp2.str, sign: sign2, amount: amount2};
      }).filter(Boolean).sort((a,b)=>Math.abs(b.amount)-Math.abs(a.amount));
      return {tgt, str: imp.str, sign, amount, note: imp.note, secondOrder};
    }).filter(Boolean).sort((a,b)=>Math.abs(b.amount)-Math.abs(a.amount));
    return {input: inp, firstOrder};
  });
}

function renderCascades(cascades){
  return cascades.map(c=>{
    const cls = c.input.dir === 'up' ? 'up' : 'dn';
    const arrow = c.input.dir === 'up' ? '↑' : '↓';
    if(!c.firstOrder.length){
      return `<div class="cascade">
        <div class="cascade-input ${cls}"><span class="ci-arrow">${arrow}</span><span>${c.input.ind.name}</span><span class="ci-cat">${CATS[c.input.ind.cat].short}</span></div>

    }
    return `<div class="cascade">

        <span class="ci-cat">${CATS[c.input.ind.cat].short}</span>
      </div>
      <div class="cascade-body">
        ${c.firstOrder.map(fo=>{
          const c1cls = fo.sign >= 0 ? 'pos' : 'neg';
          const c1arr = fo.sign >= 0 ? '↑' : '↓';
          return `<div class="cascade-branch">
            <div class="cascade-1 ${c1cls}" onclick="openDeepDive('${fo.tgt.id}','simulate')">
              <span class="cn-arrow">${c1arr}</span>

              <span class="cn-tag">${fo.str} · ${fo.sign>=0?'+':''}${fo.amount.toFixed(2)} ${fo.tgt.unit}</span>
            </div>
            ${fo.secondOrder.length ? `
              <div class="cascade-children">
                ${fo.secondOrder.map(so=>{
                  const c2cls = so.sign >= 0 ? 'pos' : 'neg';
                  const c2arr = so.sign >= 0 ? '↑' : '↓';
                  return `<div class="cascade-2 ${c2cls}" onclick="openDeepDive('${so.tgt.id}','simulate')">
                    <span class="cn-arrow">${c2arr}</span>
                    <span class="cn-name">${so.tgt.name}</span>
                    <span class="cn-tag">${so.str} · ${so.sign>=0?'+':''}${so.amount.toFixed(2)} ${so.tgt.unit}</span>
                  </div>`;
                }).join('')}
              </div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

// ─── PROJECT ANY INDICATOR ─────────────────────────
function projectIndicator(id){
  const host = document.getElementById('pr-result-host');
  if(!id){ host.innerHTML = ''; return; }
  const ind = IND_MAP[id]; if(!ind){ host.innerHTML = ''; return; }
  const ripple = computeRipple();
  const eff = ripple ? ripple.effects.find(e=>e.target.id === id) : null;
  const cur = state.values[id]||0;

  if(eff){
    const sign = eff.amount >= 0 ? 'pos' : 'neg';
    const arrow = eff.amount >= 0 ? '↑' : '↓';
    const proj = cur + eff.amount;
    const inputs = ripple.inputs.find(i=>i.id===id);
    if(inputs){
      // It's an input itself
      host.innerHTML = `<div class="pr-result"><div class="nm">${ind.name} <span style="font-family:var(--mono);font-size:11px;color:var(--tx-3);text-transform:uppercase;letter-spacing:0.14em">You moved this</span></div><div class="narr">This indicator is one of your scenario inputs — you set it to move <em>${inputs.dir}</em>. Downstream effects from it appear in the cascade tree below.</div></div>`;
      return;
    }
    host.innerHTML = `
      <div class="pr-result" data-testid="pr-result-${id}">
        <div class="nm">${ind.name}<span class="aff-timing" style="font-size:9px">${TIMING[ind.type]}</span></div>
        <div class="vals">Current <strong>${cur.toFixed(2)} ${ind.unit}</strong> → Projected <span class="big">${proj.toFixed(2)} ${ind.unit}</span> <span class="arrow ${sign}">${arrow} ${Math.abs(eff.amount).toFixed(2)} ${ind.unit}</span></div>
        <div class="narr">${explainEffect(eff, ripple)}</div>
        <div class="actions">
          <button onclick="openDeepDive('${id}','simulate')">View deep-dive</button>
          <button onclick="closest_card_scroll('${id}')">Scroll to outlook card</button>
        </div>
      </div>`;
  } else {
    // Not affected — find which inputs would affect it
    const possibleSources = INDICATORS.filter(src=> (src.impacts||[]).some(i=>i.to===id));
    const indirectSources = new Set();
    INDICATORS.forEach(src=>{
      (src.impacts||[]).forEach(imp=>{
        const mid = IND_MAP[imp.to];
        if(mid && (mid.impacts||[]).some(i2=>i2.to===id) && src.id !== id){
          indirectSources.add(src.id+'|via|'+mid.id);
        }
      });
    });
    const srcList = possibleSources.slice(0,6);
    const indirectList = Array.from(indirectSources).slice(0,4).map(s=>{
      const [a,_,b] = s.split('|');
      return {direct: IND_MAP[a], via: IND_MAP[b]};
    });
    host.innerHTML = `
      <div class="pr-result miss" data-testid="pr-result-${id}">
        <div class="nm">${ind.name}<span class="aff-timing" style="font-size:9px">unchanged</span></div>
        <div class="vals">Current <strong>${cur.toFixed(2)} ${ind.unit}</strong> — <em style="font-style:italic;color:var(--tx-3)">not affected by your current scenario</em></div>
        <div class="narr">${ind.what}<br><br><strong>To project ${ind.name}, set a direction on one of these direct drivers:</strong></div>
        <div class="actions">
          ${srcList.map(s=>`<button onclick="setFc('${s.id}','up');projectIndicator('${id}')">+ ${s.name} ↑</button>`).join('')}
        </div>
        ${indirectList.length?`<div class="narr" style="margin-top:10px"><strong>Indirect drivers (2-step):</strong> ${indirectList.map(i=>`${i.direct.name} → ${i.via.name}`).join(' · ')}</div>`:''}
      </div>`;
  }
}

  if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.outline='2px solid var(--gold)'; setTimeout(()=>el.style.outline='',1500); }

// ─── EXPLAIN-WHY (per-indicator narrative) ─────
function explainEffect(eff, ripple){
  const ind = eff.target;
  const directionWord = eff.amount >= 0 ? 'rises' : 'falls';
  const magNorm = Math.abs(eff.amount) / indicatorScale(ind);
  const magWord = magNorm >= 0.6 ? 'sharply' : magNorm >= 0.3 ? 'noticeably' : 'modestly';
  const directs = eff.contributions.filter(c=>c.hop===1);
  const seconds = eff.contributions.filter(c=>c.hop===2);

  const parts = [];
  parts.push(`<p><strong>${ind.name} ${directionWord} ${magWord} in this scenario.</strong></p>`);

  if(directs.length){
    parts.push(`<p><strong>Direct path${directs.length>1?'s':''}:</strong> ${directs.map(d=>{
      const inp = ripple.inputs.find(i=>i.id===d.from.id);
      const inpDir = inp ? (inp.dir==='up'?'↑':'↓') : '';
      const dirWord = inp ? (inp.dir==='up'?'raised':'lowered') : 'moved';
      const linkType = d.sign >= 0 ? 'positive' : 'negative';
      return `you ${dirWord} <em>${d.from.name}</em> ${inpDir}, which has a <strong>${d.str}-strength ${linkType}</strong> link to ${ind.name}${d.note?` (${d.note.toLowerCase()})`:''}.`;
    }).join(' ')}</p>`);
  }

  if(seconds.length){
    parts.push(`<p><strong>Secondary path${seconds.length>1?'s':''}:</strong> ${seconds.map(s=>{
      const viaEff = ripple.effects.find(e=>e.target.id===s.via.id);
      const viaDir = viaEff && viaEff.amount >= 0 ? 'rising' : 'falling';
      const linkType = s.sign >= 0 ? 'positive' : 'negative';
      return `because <em>${s.via.name}</em> is ${viaDir} (1st-order effect), and ${s.via.name} has a ${s.str}-strength ${linkType} link to ${ind.name}.`;
    }).join(' ')}</p>`);
  }

  parts.push(`<p><strong>How to read it:</strong> ${ind.how}</p>`);

  const timingNote = ind.type === 'lead'
    ? `As a leading indicator, ${ind.name} typically responds first — watch this carefully because it foreshadows the next 1–2 quarters.`
    : ind.type === 'lag'
    ? `As a lagging indicator, ${ind.name} reacts only after the dust settles — the move shows up over 4–8 quarters.`
    : `As a coincident indicator, ${ind.name} moves alongside the broader cycle over 2–4 quarters.`;
  parts.push(`<p><strong>Timing:</strong> ${timingNote}</p>`);

  if(ind.example) parts.push(`<p><strong>Historical echo:</strong> ${ind.example}</p>`);

  const pathStr = [...directs, ...seconds].slice(0,3).map(c=>{
    if(c.hop===1) return `${c.from.name} → ${ind.name}`;
    return `${ripple.inputs.find(i=>i.id===c.from.id)?.ind.name || c.from.name} → ${c.via.name} → ${ind.name}`;
  }).join(' • ');
  if(pathStr) parts.push(`<div class="path">Path: ${pathStr}</div>`);

  return parts.join('');
}

function toggleExplain(id, e){

  if(!panel) return;
  const open = panel.classList.toggle('open');
  if(btn) btn.classList.toggle('open', open);
  if(btn) btn.firstChild.textContent = open ? 'Hide explanation' : 'Why does this move';
}

function getContextBanner(ind, ctx){
  const v = state.values[ind.id];
  const st = statusOf(ind, v);
  if(ctx === 'snapshot'){
    const dir = v > ind.target ? 'above' : v < ind.target ? 'below' : 'at';
    const dist = Math.abs(v - ind.target);
    const distNorm = dist / Math.max(0.5, Math.abs(ind.wh - ind.wl));
    const intensity = distNorm > 0.5 ? 'sharply' : distNorm > 0.2 ? 'meaningfully' : 'mildly';
    const interp = (v > ind.target && ind.cat === 'inflation') ? 'This is a yellow flag — inflation above target tightens RBI policy.'
      : (v < ind.target && ind.cat === 'gdp') ? 'Growth below target is a sign of lost momentum.'
      : (st.txt === 'On target') ? 'This is right where macro thinkers want it.'
      : '';
    return `<div class="ctx-banner ctx-snap"><div class="ctx-eye">Right now</div><p><strong>${ind.name}</strong> is at <em>${v.toFixed(2)} ${ind.unit}</em> — ${intensity} ${dir} the target of ${ind.target} ${ind.unit}. ${interp} Status: <strong>${st.txt}</strong>.</p></div>`;
  }
  if(ctx === 'simulate'){
    const ripple = computeRipple();
    if(!ripple) return `<div class="ctx-banner ctx-sim"><div class="ctx-eye">Simulation context</div><p>No scenario set yet. Set at least one indicator direction on the Simulate tab to see how this indicator might move.</p></div>`;
    const eff = ripple.effects.find(e=>e.target.id === ind.id);
    const isInput = ripple.inputs.find(i=>i.id === ind.id);
    if(isInput) return `<div class="ctx-banner ctx-sim"><div class="ctx-eye">Simulation context</div><p>This indicator is one of your <strong>scenario inputs</strong> — you set it to move <em>${isInput.dir}</em>. The cascade tree shows the downstream effects on the Simulate tab.</p></div>`;
    if(eff){
      const arrow = eff.amount >= 0 ? '↑' : '↓';
      const proj = v + eff.amount;
      return `<div class="ctx-banner ctx-sim"><div class="ctx-eye">Simulation context</div><p>In your current scenario this would move <em>${arrow} ${Math.abs(eff.amount).toFixed(2)} ${ind.unit}</em> over the next ${TIMING[ind.type]} — projecting <strong>${proj.toFixed(2)} ${ind.unit}</strong> from ${v.toFixed(2)}. Driven by ${eff.contributions.slice(0,2).map(c=>c.from.name).join(' & ')}.</p></div>`;
    }
    return `<div class="ctx-banner ctx-sim"><div class="ctx-eye">Simulation context</div><p>This indicator is <strong>not directly affected</strong> by your current scenario inputs. On the Simulate tab, use "Project any indicator" to see which inputs would move it.</p></div>`;
  }
  if(ctx === 'compare'){
    const others = state.compareIds.filter(id=>id!==ind.id).map(id=>IND_MAP[id]).filter(Boolean);
    if(!others.length) return '';
    // Compute correlations
    const lines = others.map(o=>{
      const cl = corrAndLag(state.history[ind.id]||[], state.history[o.id]||[], 2);
      if(!cl) return null;
      const dir = cl.corr > 0 ? 'with' : 'against';
      const strength = Math.abs(cl.corr) > 0.7 ? 'strongly' : Math.abs(cl.corr) > 0.4 ? 'meaningfully' : 'weakly';
      return `<strong>${strength}</strong> ${dir} <em>${o.name}</em> (r = ${cl.corr.toFixed(2)})`;
    }).filter(Boolean);
    if(!lines.length) return '';
    return `<div class="ctx-banner ctx-cmp"><div class="ctx-eye">In context of your comparison</div><p>${ind.name} moves ${lines.join(', ')} across overlapping history. Use the scatter view to spot non-linear surprises.</p></div>`;
  }
  return '';
}
